name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobqueue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_ENV: development
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobqueue
      HIGH_WATERMARK: 10000
      LOW_WATERMARK: 2000
      MAX_RETRIES: 5
      JOB_TIMEOUT_SECONDS: 30
      WORKER_COUNT: 2
      WEIGHT_CRITICAL: 60
      WEIGHT_HIGH: 30
      WEIGHT_NORMAL: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install "poetry>=2.1.3,<3.0.0"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run linting
        run: poetry run ruff check .

      - name: Run type checking
        run: poetry run mypy app/ --ignore-missing-imports --no-strict-optional

      - name: Run database migrations
        run: poetry run alembic upgrade head

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short
