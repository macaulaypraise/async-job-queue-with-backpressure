services:
  app:
    build: .
    command: >
      sh -c "poetry run alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
      - MAX_RETRIES=5
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  job_worker:
    build: .
    command: python -m app.workers.job_worker
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - WORKER_COUNT=2
      - MAX_RETRIES=5
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  reaper:
    build: .
    command: python -m app.workers.reaper
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
      - MAX_RETRIES=5
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobqueue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_data:
