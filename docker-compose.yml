services:
  app:
    build: .
    command: >
      sh -c "/opt/venv/bin/alembic upgrade head &&
             /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
      - MAX_RETRIES=5
      - JOB_TIMEOUT_SECONDS=30
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  job_worker:
    build: .
    command: /opt/venv/bin/python -m app.workers.job_worker
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - WORKER_COUNT=2
      - MAX_RETRIES=5
      - JOB_TIMEOUT_SECONDS=30
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  reaper:
    build: .
    command: /opt/venv/bin/python -m app.workers.reaper
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
      - HIGH_WATERMARK=10000
      - LOW_WATERMARK=2000
      - MAX_RETRIES=5
      - JOB_TIMEOUT_SECONDS=30
      - WEIGHT_CRITICAL=60
      - WEIGHT_HIGH=30
      - WEIGHT_NORMAL=10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobqueue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  locust:
    image: locustio/locust:latest
    ports:
      - "8089:8089"
    volumes:
      - ./tests/load:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --host http://app:8000
    depends_on:
      - app
    profiles:
      - load   # only starts with: docker compose --profile load up

volumes:
  postgres_data:
  grafana_data:
